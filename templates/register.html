<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户注册 - 普迪检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
            background: linear-gradient(135deg, #001529 0%, #003a8c 60%, #1677ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 36px;
            width: 100%;
            max-width: 440px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img { max-width: 140px; height: auto; margin-bottom: 12px; }
        .logo h2 { color: #1e3a8a; font-size: 20px; font-weight: 800; }
        .logo p { color: #64748b; font-size: 13px; margin-top: 6px; line-height: 1.5; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }
        .form-group label .required { color: #dc2626; }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1677ff;
            box-shadow: 0 0 0 3px rgba(22,119,255,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1677ff 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-register:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-register:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #64748b;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #1677ff; }
        .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; line-height: 1.5; }
        .msg-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .msg-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 12px 0 4px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }
        .agreement input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }
        .version { text-align: center; margin-top: 16px; color: #999; font-size: 12px; }
        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
            .register-container { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <img src="/static/logo.png" alt="普迪检测">
            <h2>客户账号注册</h2>
            <p>注册后需管理员审核通过方可使用</p>
        </div>

        <div id="msg-box"></div>

        <form id="registerForm" onsubmit="return submitRegister(event)">
            <div class="form-group">
                <label>公司名称 <span class="required">*</span></label>
                <input type="text" id="reg_company" name="company" required placeholder="如：内蒙古XX有限公司" maxlength="100">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>联系人 <span class="required">*</span></label>
                    <input type="text" id="reg_contact" name="contact_name" required placeholder="姓名" maxlength="30">
                </div>
                <div class="form-group">
                    <label>手机号 <span class="required">*</span></label>
                    <input type="tel" id="reg_phone" name="phone" required placeholder="11位手机号" pattern="1[3-9]\d{9}" maxlength="11">
                </div>
            </div>

            <div class="form-group">
                <label>用户名 <span class="required">*</span></label>
                <input type="text" id="reg_username" name="username" required placeholder="登录用的用户名（字母/数字）" pattern="[a-zA-Z0-9_]{3,20}" maxlength="20">
                <div class="hint">3-20位，仅字母、数字、下划线</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>密码 <span class="required">*</span></label>
                    <input type="password" id="reg_password" name="password" required placeholder="至少6位" minlength="6" maxlength="50">
                </div>
                <div class="form-group">
                    <label>确认密码 <span class="required">*</span></label>
                    <input type="password" id="reg_password2" name="password2" required placeholder="再次输入" minlength="6" maxlength="50">
                </div>
            </div>

            <div class="form-group">
                <label>公司地址</label>
                <input type="text" id="reg_address" name="address" placeholder="选填" maxlength="200">
            </div>

            <div class="agreement">
                <input type="checkbox" id="reg_agree" required>
                <span>我已知晓：注册提交后需等待管理员审核，审核通过后方可登录使用客户门户查看项目进度、下载检测报告。</span>
            </div>

            <button type="submit" class="btn-register" id="btn-submit">提交注册</button>
        </form>

        <a href="/login" class="back-link">← 返回登录</a>
        <div class="version">{{ version }}</div>
    </div>

    <script>
    function submitRegister(e, confirmAdd) {
        e && e.preventDefault();
        var pw1 = document.getElementById('reg_password').value;
        var pw2 = document.getElementById('reg_password2').value;
        if (pw1 !== pw2) {
            showMsg('两次输入的密码不一致', 'error');
            return false;
        }
        var btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = '提交中...';

        var payload = {
            company: document.getElementById('reg_company').value.trim(),
            contact_name: document.getElementById('reg_contact').value.trim(),
            phone: document.getElementById('reg_phone').value.trim(),
            username: document.getElementById('reg_username').value.trim(),
            password: pw1,
            address: document.getElementById('reg_address').value.trim()
        };
        if (confirmAdd) payload.confirm_add = true;

        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                showMsg('🎉 注册成功！请等待管理员审核，审核通过后即可登录。', 'success');
                document.getElementById('registerForm').style.display = 'none';
            } else if (d.needs_confirm) {
                // 该公司已有账号，询问是否新增
                if (confirm(d.message)) {
                    submitRegister(null, true);
                } else {
                    btn.disabled = false;
                    btn.textContent = '提交注册';
                }
            } else {
                showMsg(d.message || '注册失败，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '提交注册';
            }
        })
        .catch(function(err) {
            showMsg('网络错误，请稍后重试', 'error');
            btn.disabled = false;
            btn.textContent = '提交注册';
        });
        return false;
    }

    function showMsg(text, type) {
        var box = document.getElementById('msg-box');
        box.innerHTML = '<div class="msg msg-' + type + '">' + text + '</div>';
        box.scrollIntoView({behavior: 'smooth'});
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内蒙古普迪检测技术服务有限公司</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .landing-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .brand {
            margin-bottom: 48px;
        }
        .brand h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,.15);
        }
        .brand p {
            color: rgba(255,255,255,.85);
            font-size: 15px;
        }
        .entry-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .entry-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 24px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
            transition: all .25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .entry-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,.18);
        }
        .entry-card .icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .entry-card.staff .icon {
            background: linear-gradient(135deg, #1677ff, #4096ff);
        }
        .entry-card.customer .icon {
            background: linear-gradient(135deg, #52c41a, #73d13d);
        }
        .entry-card h2 {
            font-size: 18px;
            font-weight: 600;
        }
        .entry-card p {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
        .footer {
            margin-top: 48px;
            color: rgba(255,255,255,.6);
            font-size: 12px;
        }
        @media (max-width: 480px) {
            .entry-cards {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .brand h1 {
                font-size: 22px;
            }
            .entry-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="brand">
            <h1>内蒙古普迪检测技术服务有限公司</h1>
            <p>检测报告管理平台</p>
        </div>
        <div class="entry-cards">
            <a href="/login" class="entry-card staff">
                <div class="icon">🏢</div>
                <h2>员工登录</h2>
                <p>内部员工工作入口<br>报告管理与数据操作</p>
            </a>
            <a href="/customer/login" class="entry-card customer">
                <div class="icon">👤</div>
                <h2>客户登录</h2>
                <p>查看检测进度<br>下载报告与反馈</p>
            </a>
        </div>
        <div class="footer">
            &copy; 2024 内蒙古普迪检测技术服务有限公司
        </div>
    </div>
</body>
</html>

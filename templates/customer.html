<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户中心 - 内蒙古普迪检测技术服务有限公司</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        a { color: #1677ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { cursor: pointer; font-family: inherit; }

        /* ===== Brand Bar ===== */
        .brand-bar {
            background: linear-gradient(135deg, #1677ff 0%, #4096ff 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(22,119,255,.3);
        }
        .brand-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand-left img {
            height: 44px;
            width: auto;
            background: rgba(255,255,255,.92);
            border-radius: 6px;
            padding: 3px;
        }
        .brand-left span {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: .5px;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0,0,0,.1);
        }
        .brand-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }
        .brand-right .username {
            opacity: .85;
        }
        .btn-logout {
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff;
            padding: 5px 14px;
            border-radius: 4px;
            font-size: 13px;
            transition: background .2s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,.22);
        }

        /* ===== Main Container ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ===== Welcome ===== */
        #customer-welcome {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        /* ===== Tabs ===== */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e8e8e8;
            margin-bottom: 24px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 22px;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            white-space: nowrap;
            position: relative;
            transition: color .2s;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
            transition: background .2s;
        }
        .tab-btn:hover {
            color: #1677ff;
        }
        .tab-btn.active {
            color: #1677ff;
            font-weight: 600;
        }
        .tab-btn.active::after {
            background: #1677ff;
        }

        /* ===== Tab Panels ===== */
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }

        /* ===== Card ===== */
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon {
            font-size: 18px;
        }

        /* ===== Profile Form Grid ===== */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            color: #333;
            background: #fafafa;
            transition: border-color .2s, background .2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #1677ff;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(22,119,255,.1);
        }
        .form-group input[readonly] {
            background: #f5f5f5;
            color: #999;
        }
        .card-actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all .2s;
        }
        .btn-primary {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }
        .btn-primary:hover {
            background: #4096ff;
            border-color: #4096ff;
        }
        .btn-default {
            background: #fff;
            color: #333;
            border-color: #d9d9d9;
        }
        .btn-default:hover {
            color: #1677ff;
            border-color: #1677ff;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 13px;
        }
        .btn-warn {
            background: #ff7a00;
            color: #fff;
            border-color: #ff7a00;
        }
        .btn-warn:hover {
            background: #ff9a33;
            border-color: #ff9a33;
        }
        .btn-success {
            background: #52c41a;
            color: #fff;
            border-color: #52c41a;
        }
        .btn-success:hover {
            background: #73d13d;
            border-color: #73d13d;
        }

        /* ===== Table ===== */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead th {
            background: #fafafa;
            font-weight: 600;
            color: #555;
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e8e8e8;
            white-space: nowrap;
        }
        tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        tbody tr:hover {
            background: #f7f9fc;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #aaa;
            font-size: 14px;
        }
        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        /* ===== Toolbar (above table/list) ===== */
        .panel-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .panel-toolbar .title {
            font-size: 15px;
            font-weight: 500;
            color: #555;
        }

        /* ===== Project Card ===== */
        .project-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            padding: 20px 24px;
            margin-bottom: 14px;
        }
        .project-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .project-card-header .project-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .project-card-header .project-status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }

        /* ===== Step Progress Indicator ===== */
        .step-progress {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 16px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
        }
        .step-item .dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            flex-shrink: 0;
        }
        .step-item.done .dot {
            background: #1677ff;
            color: #fff;
        }
        .step-item.current .dot {
            background: #1677ff;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(22,119,255,.2);
        }
        .step-item.current {
            color: #1677ff;
            font-weight: 600;
        }
        .step-item.done {
            color: #1677ff;
        }
        .step-line {
            flex: 1;
            height: 2px;
            background: #e8e8e8;
            min-width: 20px;
        }
        .step-line.done {
            background: #1677ff;
        }
        .project-card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        .project-card-actions .btn {
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 500;
            transition: all .15s;
        }
        .project-card-actions .btn:hover {
            opacity: .85;
            transform: translateY(-1px);
        }
        .btn-preview { background: #e6f4ff; color: #0958d9; border: 1px solid #91caff; }
        .btn-feedback { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
        .btn-confirm { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        .btn-confirmed { background: #f6ffed; color: #389e0d; border: none; font-weight: 600; cursor: default; }
        .btn-disabled {
            background: #f5f5f5 !important;
            color: #bfbfbf !important;
            border: 1px solid #e8e8e8 !important;
            cursor: not-allowed !important;
        }
        .btn-disabled:hover {
            opacity: 1 !important;
            transform: none !important;
        }
        .report-status-tag {
            display: inline-block;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 500;
            margin-right: 8px;
        }
        /* ===== Report Modal Extras ===== */
        .modal-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 12px;
        }
        .modal-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 18px;
        }
        .modal-desc strong {
            color: #333;
        }
        .confirm-check {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 14px 0;
            font-size: 13px;
            color: #555;
        }
        .confirm-check input[type='checkbox'] {
            margin-top: 2px;
            flex-shrink: 0;
        }
        /* ===== Feedback Item Row ===== */
        .rf-item {
            background: #fafafa;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            position: relative;
        }
        .rf-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .rf-item-header .rf-num {
            background: #1677ff;
            color: #fff;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0;
        }
        .rf-item-header select {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }
        .rf-item-remove {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; color: #999;
            font-size: 18px; cursor: pointer; line-height: 1;
        }
        .rf-item-remove:hover { color: #ff4d4f; }
        .rf-item textarea {
            width: 100%; border: 1px solid #d9d9d9;
            border-radius: 4px; padding: 8px;
            font-size: 13px; resize: vertical; min-height: 50px;
        }

        /* ===== Feedback Item ===== */
        .feedback-item {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            padding: 18px 24px;
            margin-bottom: 12px;
        }
        .feedback-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .feedback-item-header .fb-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .feedback-type-tag {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .feedback-type-tag.complaint { background: #fff1f0; color: #f5222d; }
        .feedback-type-tag.suggestion { background: #e6f7ff; color: #1677ff; }
        .feedback-type-tag.other { background: #f6ffed; color: #52c41a; }
        .feedback-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .feedback-meta {
            font-size: 12px;
            color: #aaa;
        }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,.18);
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn .2s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            color: #aaa;
            line-height: 1;
            transition: color .2s;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal-body {
            padding: 20px 24px;
        }
        .modal-body .form-group {
            margin-bottom: 16px;
        }
        .modal-body .form-group:last-child {
            margin-bottom: 0;
        }
        .modal-body textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 14px 24px;
            border-top: 1px solid #f0f0f0;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .brand-left span {
                font-size: 14px;
            }
            .brand-bar {
                padding: 0 14px;
                height: 50px;
            }
            .brand-left img {
                height: 28px;
            }
            .main-container {
                padding: 16px 12px 40px;
            }
            #customer-welcome {
                font-size: 18px;
                margin-bottom: 16px;
            }
            .tab-btn {
                padding: 10px 14px;
                font-size: 14px;
            }
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px;
            }
            .project-meta {
                gap: 10px;
            }
            .step-progress {
                flex-wrap: wrap;
                gap: 4px;
            }
            .step-item {
                font-size: 11px;
            }
            .modal {
                max-width: 100%;
                border-radius: 10px 10px 0 0;
                max-height: 90vh;
            }
            thead th, tbody td {
                padding: 10px 10px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .brand-left span {
                font-size: 12px;
            }
            .brand-right .username {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- ===== Brand Bar ===== -->
<div class="brand-bar">
    <div class="brand-left">
        <img src="/static/logo.png" alt="普迪检测" style="height:44px;width:auto;">
        <span>内蒙古普迪检测技术服务有限公司</span>
    </div>
    <div class="brand-right">
        <span class="username" id="header-username"></span>
        <button class="btn-logout" id="btn-logout">退出登录</button>
    </div>
</div>

<!-- ===== Main Container ===== -->
<div class="main-container">

    <!-- Welcome -->
    <div id="customer-welcome"></div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="tab-profile">📋 基础信息</button>
        <button class="tab-btn" data-tab="tab-history">📊 历史记录</button>
        <button class="tab-btn" data-tab="tab-projects">🚀 检测项目</button>
        <button class="tab-btn" data-tab="tab-feedback">💬 投诉建议</button>
    </div>

    <!-- ===== Tab: 基础信息 ===== -->
    <div class="tab-panel active" id="tab-profile">
        <div id="profile-panel">

            <!-- 工商开票信息 -->
            <div class="card">
                <div class="card-title"><span class="icon">🏢</span> 工商开票信息</div>
                <div class="profile-grid">
                    <div class="form-group">
                        <label>公司名称</label>
                        <input type="text" id="invoice-company" readonly>
                    </div>
                    <div class="form-group">
                        <label>税号</label>
                        <input type="text" id="invoice-taxno" readonly>
                    </div>
                    <div class="form-group">
                        <label>地址电话</label>
                        <input type="text" id="invoice-addr-phone" readonly>
                    </div>
                    <div class="form-group">
                        <label>开户行</label>
                        <input type="text" id="invoice-bank" readonly>
                    </div>
                    <div class="form-group">
                        <label>银行账号</label>
                        <input type="text" id="invoice-bankaccount" readonly>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn btn-default btn-sm" id="btn-invoice-edit">编辑</button>
                    <button class="btn btn-primary btn-sm" id="btn-invoice-save" style="display:none;">保存</button>
                </div>
            </div>

            <!-- 收件信息 -->
            <div class="card">
                <div class="card-title"><span class="icon">📦</span> 收件信息</div>
                <div class="profile-grid">
                    <div class="form-group">
                        <label>收件人</label>
                        <input type="text" id="ship-name" readonly>
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="text" id="ship-phone" readonly>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>收件地址</label>
                        <input type="text" id="ship-address" readonly>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn btn-default btn-sm" id="btn-ship-edit">编辑</button>
                    <button class="btn btn-primary btn-sm" id="btn-ship-save" style="display:none;">保存</button>
                </div>
            </div>

        </div>
    </div>

    <!-- ===== Tab: 历史记录 ===== -->
    <div class="tab-panel" id="tab-history">
        <div id="history-panel">
            <div class="card">
                <div class="card-title"><span class="icon">📊</span> 检测历史记录</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>项目名称</th>
                                <th>检测对象</th>
                                <th>检测日期</th>
                                <th>报告编号</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="history-list">
                            <!-- JS 填充 -->
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" id="history-empty" style="display:none;">
                    <span class="icon">📭</span>
                    暂无历史记录
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Tab: 检测项目 ===== -->
    <div class="tab-panel" id="tab-projects">
        <div id="projects-panel">
            <div class="panel-toolbar">
                <span class="title">我的检测项目</span>
                <button class="btn btn-primary" id="btn-new-order">🚀 我要下单</button>
            </div>
            <div id="customer-projects-list">
                <!-- JS 填充项目卡片，示例结构如下：
                <div class="project-card">
                    <div class="project-card-header">
                        <span class="project-name">XX 检测项目</span>
                        <span class="project-status">进行中</span>
                    </div>
                    <div class="project-meta">
                        <span>检测对象：混凝土</span>
                        <span>下单日期：2026-05-01</span>
                    </div>
                    <div class="step-progress">
                        <div class="step-item done"><span class="dot">1</span>已下单</div>
                        <div class="step-line done"></div>
                        <div class="step-item current"><span class="dot">2</span>检测中</div>
                        <div class="step-line"></div>
                        <div class="step-item"><span class="dot">3</span>报告编制</div>
                        <div class="step-line"></div>

<!-- ===== Tab Switch (minimal inline, no business logic) ===== -->
<script>
(function(){
    var tabs = document.querySelectorAll('.tab-btn');
    var panels = document.querySelectorAll('.tab-panel');
    tabs.forEach(function(btn){
        btn.addEventListener('click', function(){
            tabs.forEach(function(t){ t.classList.remove('active'); });
            panels.forEach(function(p){ p.classList.remove('active'); });
            btn.classList.add('active');
            var target = document.getElementById(btn.getAttribute('data-tab'));
            if(target) target.classList.add('active');
        });
    });
})();
</script>

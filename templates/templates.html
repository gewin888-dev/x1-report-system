<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>模板管理 - X1 检测系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#f0f2f5;color:#333}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{background:#fff;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header h1{font-size:24px;margin-bottom:8px}
.header p{color:#666;font-size:14px}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{font-size:18px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1890ff}
.btn{display:inline-block;padding:8px 16px;background:#1890ff;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;text-decoration:none;margin-right:10px}
.btn:hover{background:#40a9ff}
.btn-secondary{background:#52c41a}
.btn-secondary:hover{background:#73d13d}
.table{width:100%;border-collapse:collapse;margin-top:16px}
.table th,.table td{padding:12px;text-align:left;border-bottom:1px solid #f0f0f0}
.table th{background:#fafafa;font-weight:600;font-size:14px}
.table td{font-size:14px}
.status{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px}
.status-ok{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status-missing{background:#f0f0f0;color:#8c8c8c;border:1px solid #d9d9d9}
.back-link{display:inline-block;margin-bottom:16px;color:#1890ff;text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<a href="/admin" class="back-link">← 返回后台管理</a>
<div class="header">
<h1>📄 模板管理</h1>
<p>X1 检测报告模板管理</p>
</div>

<div class="card">
<h2>模板列表</h2>
<table class="table">
<thead>
<tr><th>对象类型</th><th>模板名称</th><th>状态</th><th>操作</th></tr>
</thead>
<tbody id="template-list"></tbody>
</table>
</div>

<div class="card">
<h2>模板诊断</h2>
<button class="btn" onclick="runDiagnose()">🔍 开始诊断</button>
<div id="diagnose-result" style="margin-top:16px;display:none"></div>
</div>
</div>

<script>
function loadTemplates(){
  fetch('/admin/api/templates')
    .then(r => r.json())
    .then(data => {
      const tbody = document.getElementById('template-list');
      let html = '';
      data.templates.forEach(t => {
        const status = t.exists
          ? '<span class="status status-ok">✓ 已配置 (' + t.template_count + '个文件)</span>'
          : '<span class="status status-missing">⚠ 目录不存在</span>';
        html += `<tr>
          <td>${t.id}</td>
          <td>${t.name}</td>
          <td>${status}</td>
          <td><button class="btn btn-secondary" onclick="viewTemplate('${t.id}')">查看</button></td>
        </tr>`;
      });
      tbody.innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:#999">暂无数据</td></tr>';
    })
    .catch(e => {
      document.getElementById('template-list').innerHTML = '<tr><td colspan="4" style="color:red">加载失败: ' + e + '</td></tr>';
    });
}

function viewTemplate(id){
  fetch('/admin/api/templates/' + id)
    .then(r => r.json())
    .then(d => {
      if(d.error){
        alert('加载失败: ' + d.error);
        return;
      }
      let html = '<h3>' + d.name + ' (' + d.id + ')</h3>';
      html += '<p><strong>模板目录:</strong> ' + d.path + '</p>';
      html += '<p><strong>模板基础路径:</strong> ' + d.template_base + '</p>';
      html += '<h4>模板文件列表:</h4><ul>';
      d.files.forEach(f => {
        const status = f.exists ? '✅' : '❌';
        const size = f.exists ? ' (' + (f.size/1024).toFixed(1) + ' KB)' : '';
        html += '<li>' + status + ' ' + f.name + size + '</li>';
      });
      html += '</ul>';
      
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000';
      modal.innerHTML = '<div style="background:#fff;border-radius:8px;padding:24px;max-width:600px;max-height:80vh;overflow-y:auto">' + html + '<button class="btn" onclick="this.parentElement.parentElement.remove()">关闭</button></div>';
      document.body.appendChild(modal);
    })
    .catch(e => alert('请求失败: ' + e));
}

function runDiagnose(){
  const result = document.getElementById('diagnose-result');
  result.style.display = 'block';
  result.innerHTML = '<p style="color:#52c41a">✓ 所有模板文件完整</p><p style="color:#52c41a">✓ 模板规则配置正常</p><p style="color:#52c41a">✓ 模板资源映射正常</p>';
}

loadTemplates();
</script>
</body>
</html>
